services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: transaction-service-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    networks:
      - transaction-network
    depends_on:
      - db
    environment:
      - APP_ENV=local
      - APP_DEBUG=true

  webserver:
    image: nginx:alpine
    container_name: transaction-service-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - transaction-network
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: transaction-service-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: transaction_db
      MYSQL_ROOT_PASSWORD: root
      MYSQL_PASSWORD: secret
      MYSQL_USER: laravel
    ports:
      - "3307:3306"
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - transaction-network

networks:
  transaction-network:
    driver: bridge

volumes:
  dbdata:
    driver: local
